server {
    listen 80;
    listen [::]:80;
    server_name 103.142.27.156;
    client_max_body_size 256M;

    location /.well-known/acme-challenge/ {
        root /opt/certificationflow/app/frontend/dist;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 103.142.27.156;
    client_max_body_size 256M;

    ssl_certificate /etc/letsencrypt/live/103.142.27.156/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/103.142.27.156/privkey.pem;

    root /opt/certificationflow/app/frontend/dist;
    index index.html;

    location /static/ {
        alias /opt/certificationflow/app/backend/staticfiles/;
    }

    location /media/ {
        alias /opt/certificationflow/app/media/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_request_buffering off;
    }

    location / {
        try_files $uri /index.html;
    }
}
